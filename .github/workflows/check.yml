name: check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.1.2
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt ruff pyyaml
      - name: Run checks
        run: |
          ruff check . --fix
          ruff format --check .
      - name: Commit changes
        id: commit
        uses: EndBug/add-and-commit@v9.1.4
        with:
          author_name: github-actions
          author_email: github-actions[bot]@users.noreply.github.com
          message: 'feat: check'
          add: '.'